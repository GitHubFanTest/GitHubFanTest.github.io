<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Malwareking GDPS Demonlist</title>
<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  color:white;
  background:black;
  min-height:100vh;
 background: radial-gradient(circle at center, #3a3a3a 0%, #1a1a1a 35%, #000000 75%);
}header{ padding:16px; background:#111; font-size:22px; font-weight:bold; border-bottom:1px solid #444; }

.section{ padding:20px; }

.card{ background:#2b2b2b; padding:15px; border-radius:12px; margin-bottom:10px; box-shadow:0 0 20px rgba(200,200,200,0.15); }

.rank{ font-weight:bold; color:#cfcfcf; font-size:18px; }

.diff{ opacity:0.8; margin-top:4px; } </style>

</head>
<body><header>Malwareking GDPS Demonlist</header><div class="section">
<h2>Demonlist</h2>
<div id="listContainer"></div>
</div><script>
let demons = [
  {name:"Remade Steel", difficulty:"Insane"},
  {name:"Techno Reactor", difficulty:"Harder"},
  {name:"Techno Reactor MKFID", difficulty:"Harder"}
];

function renderList(){
 let el = document.getElementById("listContainer");
 el.innerHTML = "";
 
 demons.forEach((d,i)=>{
   el.innerHTML += `
   <div class="card">
     <div class="rank">#${i+1}</div>
     <div><b>${d.name}</b></div>
     <div class="diff">${d.difficulty}</div>
   </div>`;
 });
}

renderList();
</script></body>
</html>
